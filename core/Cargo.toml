[package]
name = "robowallet_core"
version = "0.1.0"
edition = "2021"

[dependencies]
esp-hal = { version = "0.17.0", features = ["esp32c3"] }
panic-halt = "0.2.0"
ed25519-dalek = { version = "2.1.0", default-features = false, features = ["rand_core"] }
smoltcp = { version = "0.13.1", default-features = false, features = ["medium-ethernet", "proto-ipv4", "socket-tcp"] }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
serde-json-core = "0.6.0"

[profile.release]
opt-level = "s"
lto = true
